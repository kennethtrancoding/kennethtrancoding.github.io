		<script>
			const PREFIX_MULTIPLIERS = {
				Q: 1e30,
				R: 1e27,
				Y: 1e24,
				Z: 1e21,
				E: 1e18,
				P: 1e15,
				T: 1e12,
				G: 1e9,
				M: 1e6,
				k: 1e3,
				h: 1e2,
				da: 1e1,
				"": 1,
				d: 1e-1,
				c: 1e-2,
				m: 1e-3,
				µ: 1e-6,
				n: 1e-9,
				p: 1e-12,
				f: 1e-15,
				a: 1e-18,
				z: 1e-21,
				y: 1e-24,
				r: 1e-27,
				q: 1e-30,
			};
			const UNIT_DEFINITIONS = {
				// SI base units
				s: {
					name: "second",
					dim: { Time: 1 },
					factor: 1,
					allowPrefix: true,
					category: "time",
					aliases: ["sec"],
				},
				m: {
					name: "meter",
					dim: { Length: 1 },
					factor: 1,
					allowPrefix: true,
					category: "geometry",
					aliases: ["meter"],
				},
				g: {
					name: "gram",
					dim: { Mass: 1 },
					factor: 1,
					allowPrefix: true,
					category: "mass",
				},
				A: {
					name: "ampere",
					dim: { ElectricCurrent: 1 },
					factor: 1,
					allowPrefix: true,
					category: "electrical",
					aliases: ["amp"],
				},
				K: {
					name: "kelvin",
					dim: { Temperature: 1 },
					factor: 1,
					allowPrefix: false,
					category: "temperature",
				},
				mol: {
					name: "mole",
					dim: { AmountOfSubstance: 1 },
					factor: 1,
					allowPrefix: true,
					category: "chemistry",
				},
				cd: {
					name: "candela",
					dim: { LuminousIntensity: 1 },
					factor: 1,
					allowPrefix: true,
					category: "photometry",
				},

				// SI derived units
				Hz: {
					name: "hertz",
					dim: { Time: -1 },
					factor: 1,
					allowPrefix: true,
					category: "time",
				},
				deg: {
					name: "degree",
					dim: { PlaneAngle: 1 },
					factor: Math.PI / 180,
					allowPrefix: false,
					category: "geometry",
				},
				rad: {
					name: "radian",
					dim: { PlaneAngle: 1 },
					factor: 1,
					allowPrefix: false,
					category: "geometry",
				},
				sr: {
					name: "steradian",
					dim: { SolidAngle: 1 },
					factor: 1,
					allowPrefix: false,
					category: "geometry",
				},
				N: {
					name: "newton",
					dim: { Mass: 1, Length: 1, Time: -2 },
					factor: 1e3,
					allowPrefix: true,
					category: "mechanical",
				}, // kg*m/s^2 with base gram
				Pa: {
					name: "pascal",
					dim: { Mass: 1, Length: -1, Time: -2 },
					factor: 1e3,
					allowPrefix: true,
					category: "mechanical",
				}, // N/m^2
				J: {
					name: "joule",
					dim: { Mass: 1, Length: 2, Time: -2 },
					factor: 1e3,
					allowPrefix: true,
					category: "mechanical",
				}, // N*m
				W: {
					name: "watt",
					dim: { Mass: 1, Length: 2, Time: -3 },
					factor: 1e3,
					allowPrefix: true,
					category: "mechanical",
				}, // J/s
				C: {
					name: "coulomb",
					dim: { ElectricCurrent: 1, Time: 1 },
					factor: 1,
					allowPrefix: true,
					category: "electrical",
					aliases: ["coul"],
				},
				V: {
					name: "volt",
					dim: { Mass: 1, Length: 2, Time: -3, ElectricCurrent: -1 },
					factor: 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // J/C
				Wb: {
					name: "weber",
					dim: { Mass: 1, Length: 2, Time: -2, ElectricCurrent: -1 },
					factor: 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // V*s
				T: {
					name: "tesla",
					dim: { Mass: 1, Time: -2, ElectricCurrent: -1 },
					factor: 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // Wb/m^2
				F: {
					name: "farad",
					dim: { Mass: -1, Length: -2, Time: 4, ElectricCurrent: 2 },
					factor: 1 / 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // C/V
				ohm: {
					name: "ohm",
					dim: { Mass: 1, Length: 2, Time: -3, ElectricCurrent: -2 },
					factor: 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // V/A
				S: {
					name: "siemens",
					dim: { Mass: -1, Length: -2, Time: 3, ElectricCurrent: 2 },
					factor: 1 / 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // A/V
				H: {
					name: "henry",
					dim: { Mass: 1, Length: 2, Time: -2, ElectricCurrent: -2 },
					factor: 1e3,
					allowPrefix: true,
					category: "electrical",
				}, // Wb/A
				degC: {
					name: "degree Celsius",
					dim: { Temperature: 1 },
					factor: 1,
					offset: 273.15,
					allowPrefix: false,
					category: "temperature",
				}, // Celsius treated as Kelvin offset ignored
				lm: {
					name: "lumen",
					dim: { LuminousIntensity: 1, SolidAngle: 1 },
					factor: 1,
					allowPrefix: true,
					category: "photometry",
				}, // cd*sr
				lx: {
					name: "lux",
					dim: { LuminousIntensity: 1, Length: -2 },
					factor: 1,
					allowPrefix: true,
					category: "photometry",
				}, // lm/m^2
				Bq: {
					name: "becquerel",
					dim: { Time: -1 },
					factor: 1,
					allowPrefix: true,
					category: "radioactivity",
				},
				Gy: {
					name: "gray",
					dim: { Length: 2, Time: -2 },
					factor: 1,
					allowPrefix: true,
					category: "radiation",
				}, // J/kg
				Sv: {
					name: "sievert",
					dim: { Length: 2, Time: -2 },
					factor: 1,
					allowPrefix: true,
					category: "radiation",
				}, // J/kg
				kat: {
					name: "katal",
					dim: { AmountOfSubstance: 1, Time: -1 },
					factor: 1,
					allowPrefix: true,
					category: "chemistry",
				},

				h: {
					name: "hour",
					dim: { Time: 1 },
					factor: 3600,
					allowPrefix: false,
					category: "time",
					aliases: ["hr"],
				},
				min: {
					name: "minute",
					dim: { Time: 1 },
					factor: 60,
					allowPrefix: false,
					category: "time",
				},
				L: {
					name: "litre",
					dim: { Length: 3 },
					factor: 1e-3, // 1 L = 1e-3 m^3
					allowPrefix: true,
					category: "geometry",
					aliases: ["l", "liter", "litre"],
				},
				ha: {
					name: "hectare",
					dim: { Length: 2 },
					factor: 1e4, // 1 ha = 1e4 m^2
					allowPrefix: false,
					category: "geometry",
					aliases: ["hectare"],
				},
				t: {
					name: "tonne",
					dim: { Mass: 1 },
					factor: 1e6, // 1 t = 1000 kg = 1e6 g
					allowPrefix: false,
					aliases: ["tonne", "ton"],
					category: "mass",
				},
				eV: {
					name: "electronvolt",
					dim: { Mass: 1, Length: 2, Time: -2 },
					factor: 1.602176634e-19 * 1e3, // J in your system is 1e3 (since N, J, W use gram-base)
					allowPrefix: true,
					category: "mechanical",
					aliases: ["electronvolt", "ev"],
				},
				Da: {
					name: "dalton",
					dim: { Mass: 1 },
					factor: 1.6605390666e-24, // 1 Da = 1.660539...e-27 kg = e-24 g
					allowPrefix: true,
					category: "mass",
					aliases: ["u", "amu", "dalton"],
				},
				bar: {
					name: "bar",
					dim: { Mass: 1, Length: -1, Time: -2 },
					factor: 1e5 * 1e3, // 1 bar = 1e5 Pa; your Pa has factor 1e3 relative to g-base
					allowPrefix: false,
					category: "mechanical",
					aliases: ["b"],
				},

				// Very common non-SI (not accepted as SI units, but widely used)
				atm: {
					name: "standard atmosphere",
					dim: { Mass: 1, Length: -1, Time: -2 },
					factor: 101325 * 1e3, // 1 atm = 101325 Pa
					allowPrefix: false,
					category: "mechanical",
					aliases: ["atmosphere"],
				},
				Torr: {
					name: "torr",
					dim: { Mass: 1, Length: -1, Time: -2 },
					factor: (101325 / 760) * 1e3, // 1 Torr = 1/760 atm
					allowPrefix: false,
					category: "mechanical",
					aliases: ["torr", "mmHg"],
				},
			};
			const UNIT_ALIASES = Object.entries(UNIT_DEFINITIONS).flatMap(([key, def]) =>
				(def.aliases || []).map((alias) => [alias, key]),
			);
			const ALL_UNIT_SYMBOLS = [
				...Object.keys(UNIT_DEFINITIONS),
				...UNIT_ALIASES.map(([alias]) => alias),
			].sort((a, b) => b.length - a.length);
			const BASE_UNITS = Object.keys(UNIT_DEFINITIONS).sort((a, b) => b.length - a.length);
			const PREFIXES = Object.keys(PREFIX_MULTIPLIERS);
			const PREFIX_NAMES = {
				Q: "quetta",
				R: "ronna",
				Y: "yotta",
				Z: "zetta",
				E: "exa",
				P: "peta",
				T: "tera",
				G: "giga",
				M: "mega",
				k: "kilo",
				h: "hecto",
				da: "deca",
				"": "",
				d: "deci",
				c: "centi",
				m: "milli",
				µ: "micro",
				n: "nano",
				p: "pico",
				f: "femto",
				a: "atto",
				z: "zepto",
				y: "yocto",
				r: "ronto",
				q: "quecto",
			};
			const resolveUnitKey = (symbol) => {
				const alias = UNIT_ALIASES.find(([alias]) => alias === symbol);
				return alias ? alias[1] : symbol;
			};
			const SIMPLE_DIM_KEYS = new Set(["Length", "Time", "Mass"]);
			const SIMPLE_ALLOWED_CATEGORIES = new Set(["mechanical", "geometry", "time", "mass"]);
			const CATEGORY_SIGNATURES = {
				electrical: ["ElectricCurrent"],
				photometry: ["LuminousIntensity"],
				chemistry: ["AmountOfSubstance"],
				temperature: ["Temperature"],
				radioactivity: ["Time"],
				radiation: [], // no custom dimension modeled; treat as special-only so we'll gate below
			};
			const unitSymbols = ALL_UNIT_SYMBOLS.join("");
			// Tooltip helper disabled for now
			const getUnitName = (symbol) => {
				const key = resolveUnitKey(symbol);
				return UNIT_DEFINITIONS[key]?.name || symbol;
			};
			const getUnitCategory = (key) => UNIT_DEFINITIONS[key]?.category || "mechanical";
			const isSimpleDimension = (dim) =>
				Object.keys(dim).every((k) => SIMPLE_DIM_KEYS.has(k));
			const hasSignatureForCategory = (dim, category) => {
				const sigs = CATEGORY_SIGNATURES[category];
				if (!sigs) return true; // category not gated
				if (sigs.length === 0) return false; // no modeled signature; disallow unless dimension check later passes
				return sigs.every((k) => (dim[k] || 0) !== 0);
			};

			function pickRandom(array) {
				return array[Math.floor(Math.random() * array.length)];
			}
			function normalizeMicro(expression) {
				return expression.replace(new RegExp(`\\bu(?=[${unitSymbols}])`, "g"), "µ");
			}

			function expandFractions(expr) {
				// Handles nested braces in \frac{...}{...} by walking the string instead of using a simple regex.
				let i = 0;
				const len = expr.length;
				let out = "";

				const skipSpaces = () => {
					while (i < len && /\s/.test(expr[i])) i++;
				};

				const extractBraced = () => {
					if (expr[i] !== "{") return null;
					let depth = 0;
					const start = i + 1;
					for (; i < len; i++) {
						if (expr[i] === "{") depth++;
						else if (expr[i] === "}") {
							depth--;
							if (depth === 0) {
								const content = expr.slice(start, i);
								i++;
								return content;
							}
						}
					}
					return null;
				};

				while (i < len) {
					if (expr.startsWith("\\frac", i)) {
						i += 5;
						skipSpaces();
						const numer = extractBraced();
						if (numer === null) {
							out += "\\frac";
							continue;
						}
						skipSpaces();
						const denom = extractBraced();
						if (denom === null) {
							out += `\\frac{${numer}`;
							continue;
						}
						out += `(${numer})/(${denom})`;
						continue;
					}
					out += expr[i++];
				}
				return out;
			}

			function cleanExpression(expression) {
				const fractionNormalized = expandFractions(expression);
				const output = normalizeMicro(fractionNormalized.trim())
					.replace(/\\+left|\\+right/g, "")
					.replace(/\\+times/g, "*")
					.replace(/\\+cdot/g, "*")
					.replace(/\u00b7/g, "*")
					.replace(/\\+,/g, "")
					.replace(/\\+ /g, "*")
					.replace(/\s+/g, "")
					.replace(/\\operatorname\{([^}]+)\}/g, "$1")
					.replace(/\^\{(-?\d+)\}/g, "^$1")
					.replace(/{/g, "(")
					.replace(/}/g, ")")
					.replace(/\\/g, "");
				return output;
			}

			function insertImplicitMultiplication(expression) {
				// math.js requires explicit "*" between numbers/parentheses and unit symbols
				// and also between adjacent parentheses created by \frac expansion.
				// Examples: "10^3m" -> "10^3*m", "(3/4)m" -> "(3/4)*m", "(1)/(2)(m)/(s)" -> "(1)/(2)*(m)/(s)"
				return expression.replace(/(?<=[0-9a-zA-Zµ)\\}])(?=[a-zA-Zµ(])/g, "*");
			}

			function dimensionsEqual(dimensionA, dimensionB) {
				const keys = new Set([...Object.keys(dimensionA), ...Object.keys(dimensionB)]);
				for (const key of keys)
					if ((dimensionA[key] || 0) !== (dimensionB[key] || 0)) return false;
				return true;
			}

			const prefixPattern = PREFIXES.filter(Boolean)
				.sort((a, b) => b.length - a.length)
				.join("|");
			const unitPattern = `(${prefixPattern}|)(${ALL_UNIT_SYMBOLS.join("|")})(\\^-?\\d+)?`;
			const unitRegex = () => new RegExp(unitPattern, "g");

			function parseUnits(expression) {
				const sanitized = cleanExpression(expression);
				if (!sanitized) return { error: "Units required." };

				let factor = 1;
				const dimension = {};
				const normalizedParts = [];
				const parts = sanitized.split("/");
				let hasOffsetUnit = false;
				let offsetToBase = 0;

				for (const [index, part] of parts.entries()) {
					const sign = index ? -1 : 1;
					const segments = part
						.split("*")
						.map((s) => s.replace(/[()]/g, ""))
						.filter(Boolean);
					if (!segments.length) return { error: "Invalid unit syntax." };

					const normalizedSegments = [];
					for (const segment of segments) {
						const regex = unitRegex();
						let lastIndex = 0;
						let match;

						while ((match = regex.exec(segment)) !== null) {
							if (match.index !== lastIndex)
								return {
									error: `Invalid unit syntax near "${segment.slice(lastIndex)}"`,
								};
							const [, prefixSymbol = "", base, rawExponent = ""] = match;
							const resolvedKey = resolveUnitKey(base);
							const unit = UNIT_DEFINITIONS[resolvedKey];
							if (!unit) return { error: `Unrecognized base unit: ${base}` };
							if (!(prefixSymbol in PREFIX_MULTIPLIERS))
								return { error: `Unrecognized prefix: ${prefixSymbol}` };
							if (prefixSymbol && unit.allowPrefix === false)
								return { error: `Prefix not allowed for ${base}` };

							const exponent =
								(rawExponent ? parseInt(rawExponent.slice(1), 10) : 1) * sign;

							if (unit.offset) {
								if (
									parts.length > 1 ||
									segments.length > 1 ||
									exponent !== 1 ||
									sign === -1
								)
									return {
										error: "Offset units like Celsius cannot be combined, divided, or exponentiated.",
									};
								if (hasOffsetUnit && resolvedKey !== "degC")
									return {
										error: "Only one offset unit can be used in an expression.",
									};
								hasOffsetUnit = true;
								offsetToBase = unit.offset;
							}
							// If prefix is not allowed, we strip it from the normalized unit
							// but still apply its multiplier to the factor so the value is scaled.
							const prefixMultiplier = PREFIX_MULTIPLIERS[prefixSymbol];
							const normalizedPrefix =
								unit.allowPrefix === false && prefixSymbol ? "" : prefixSymbol;

							factor *= Math.pow(unit.factor * prefixMultiplier, exponent);

							for (const [dimensionKey, value] of Object.entries(unit.dim)) {
								dimension[dimensionKey] =
									(dimension[dimensionKey] || 0) + value * exponent;
								if (!dimension[dimensionKey]) delete dimension[dimensionKey];
							}
							normalizedSegments.push(
								`${normalizedPrefix}${resolvedKey}${rawExponent || ""}`,
							);
							lastIndex = regex.lastIndex;
						}
						if (lastIndex !== segment.length)
							return {
								error: `Invalid unit syntax near "${segment.slice(lastIndex)}"`,
							};
					}
					const combined = normalizedSegments.join("*");
					normalizedParts.push(index ? `/${combined}` : combined);
				}
				return {
					factor,
					dim: dimension,
					normalized: normalizedParts.join(""),
					hasOffset: hasOffsetUnit,
					offset: offsetToBase,
				};
			}

			function toLatexUnits(expression) {
				const parts = cleanExpression(expression).split("/");
				const formatPart = (part) => {
					const regex = unitRegex();
					let out = "";
					let last = 0;
					let match;
					while ((match = regex.exec(part)) !== null) {
						out += part.slice(last, match.index).replace(/\*/g, "\\,");
						const [, prefixSymbol, base, rawExponent = ""] = match;
						const displayPrefix = prefixSymbol === "u" ? "µ" : prefixSymbol;
						const exponent = rawExponent ? `^{${rawExponent.slice(1)}}` : "";
						out += `\\mathrm{${displayPrefix}${base}}${exponent}`;
						last = regex.lastIndex;
					}
					out += part.slice(last).replace(/\*/g, "\\,");
					return out || part;
				};

				if (parts.length === 1) return formatPart(parts[0]);

				const [first, ...rest] = parts;
				let acc = formatPart(first);
				for (const part of rest) acc = `\\frac{${acc}}{${formatPart(part)}}`;
				return acc;
			}

			function toPlainUnits(expression) {
				const parts = cleanExpression(expression).split("/");
				const formatPart = (part) => {
					const regex = unitRegex();
					let out = "";
					let last = 0;
					let match;
					while ((match = regex.exec(part)) !== null) {
						out += part.slice(last, match.index).replace(/\*/g, " ");
						const [, prefixSymbol, base, rawExponent = ""] = match;
						const prefixText = PREFIX_NAMES[prefixSymbol] || prefixSymbol;
						const baseName = getUnitName(base);
						const expo = rawExponent ? `^${rawExponent.slice(1)}` : "";
						const piece = `${prefixText ? `${prefixText}-` : ""}${baseName}${expo}`;
						out += piece.trim();
						last = regex.lastIndex;
					}
					out += part.slice(last).replace(/\*/g, " ");
					return out || part;
				};

				if (parts.length === 1) return formatPart(parts[0]);
				const [first, ...rest] = parts;
				let acc = `(${formatPart(first)})`;
				for (const part of rest) acc = `${acc} per (${formatPart(part)})`;
				return acc;

			function convertValue(value, fromUnit, toUnitExpression) {
				const fromParsed = typeof fromUnit === "string" ? parseUnits(fromUnit) : fromUnit;
				if (!fromParsed || fromParsed.error)

				if (!fromParsed.dim) return { error: "Invalid source unit." };
				const toParsed = parseUnits(toUnitExpression);
				if (toParsed.error) return { error: toParsed.error };
				if (!dimensionsEqual(fromParsed.dim, toParsed.dim))

				let baseValue = value * fromParsed.factor;
				if (fromParsed.offset) baseValue = (value + fromParsed.offset) * fromParsed.factor;

				let convertedValue = baseValue / toParsed.factor;
				if (toParsed.offset) convertedValue -= toParsed.offset;
				return { value: convertedValue };
			}

			function randomUnit(basePool = BASE_UNITS) {
				const base = pickRandom(basePool);
				const baseDef = UNIT_DEFINITIONS[base];
				const prefix = baseDef.allowPrefix ? pickRandom(PREFIXES) : "";
				const exponent = Math.floor(Math.random() * 5) - 2; // -2..2
				const unitSymbol = `${prefix}${base}`;

						unit: unitSymbol,
						exponent: Math.abs(exponent || 1),

			function getAllowedUnitPool(targetDim) {

						(key) =>
							SIMPLE_ALLOWED_CATEGORIES.has(getUnitCategory(key)) &&
							hasSignatureForCategory(targetDim, getUnitCategory(key)),
					);
					return pool.length ? pool : BASE_UNITS;

				if (targetDim) {

						hasSignatureForCategory(targetDim, getUnitCategory(key)),
					);
					return pool.length ? pool : BASE_UNITS;

			function randomUnitExpression(targetDimensions = null) {
				const targetDim =
					targetDimensions && Object.keys(targetDimensions).length
						? targetDimensions
						: null;
				const basePool = getAllowedUnitPool(targetDim);
				const targetSimple = targetDim ? isSimpleDimension(targetDim) : null;
				const maxAttempts = targetDim ? 200 : 20;

				for (let attempt = 0; attempt < maxAttempts; attempt++) {
					const termCount =
						(targetDim
							? Math.floor(Math.random() * 4)
							: Math.floor(Math.random() * 3)) + 1;

					const numer = [];
					const denom = [];
					const usedUnits = new Set();
					const numerDims = new Set();
					const denomDims = new Set();
					const usedCategories = new Set();

					for (let i = 0; i < termCount; i++) {
						let choice = null;
						for (let tries = 0; tries < 10; tries++) {
							const candidate = randomUnit(basePool);
							const category = getUnitCategory(candidate.base);
							if (targetSimple === true && !SIMPLE_ALLOWED_CATEGORIES.has(category))
								continue;
							const formatted =
								candidate.exponent === 1
									? candidate.unit
									: `${candidate.unit}^${candidate.exponent}`;
							if (usedUnits.has(formatted)) continue;

							const parsedCandidate = parseUnits(formatted);
							if (parsedCandidate.error) continue;

							const dimKeys = Object.keys(parsedCandidate.dim);
							const goesToDenom = candidate.isDenominator || Math.random() < 0.5;
							const conflicting = goesToDenom
								? dimKeys.some((k) => numerDims.has(k))
								: dimKeys.some((k) => denomDims.has(k));
							if (conflicting) continue;

							choice = {
								...candidate,
								formatted,
								goesToDenom,
								dimKeys,
								category,
							};
							usedUnits.add(formatted);
							break;
						}
						if (!choice) continue;
						const { formatted, goesToDenom, dimKeys } = choice;
						if (goesToDenom) {
							denom.push(formatted);
							dimKeys.forEach((k) => denomDims.add(k));
						} else {
							numer.push(formatted);
							dimKeys.forEach((k) => numerDims.add(k));
						}
						usedCategories.add(choice.category);
					}

					// Ensure numerator isn't empty (avoid "1/(...)" unless you want it)
					if (numer.length === 0)
						numer.push(pickRandom(PREFIXES) + pickRandom(BASE_UNITS));

					let expression = numer.join("*");
					if (denom.length > 0) expression += `/${denom.join("*")}`;

					const parsed = parseUnits(expression);
					const expressionIsSimple =
						!parsed.error && parsed.dim && isSimpleDimension(parsed.dim);
					const mustKeepSimple =
						targetSimple === null ? expressionIsSimple : targetSimple === true;
					const signaturesSatisfied =
						parsed.error || !parsed.dim
							? false
							: [...usedCategories].every((cat) =>
									cat in CATEGORY_SIGNATURES
										? hasSignatureForCategory(parsed.dim, cat)
										: true,
								);
					if (
						!parsed.error &&
						Object.keys(parsed.dim).length &&
						(!targetDim || dimensionsEqual(parsed.dim, targetDim)) &&
						!hasDimOverlapAcrossSides(expression) &&
						signaturesSatisfied &&
						(!mustKeepSimple ||
							[...usedCategories].every((c) => SIMPLE_ALLOWED_CATEGORIES.has(c)))
					)
						return expression;
				}

				if (targetDim) {
					const matchingBase = BASE_UNITS.filter((unit) =>
						dimensionsEqual(UNIT_DEFINITIONS[unit].dim, targetDim),
					);
					if (matchingBase.length) return pickRandom(matchingBase);
					console.log(
						"Failed to match requested dimensions, falling back to random unit.",
					);
				} else {
					console.log("Failed to generate complex unit, falling back to simple unit.");
				}

				return pickRandom(BASE_UNITS);
			}

			function remapPrefixes(expression) {
				let changed = "";
				let lastIndex = 0;
				const regex = unitRegex();
				let match;
				while ((match = regex.exec(expression)) !== null) {
					changed += expression.slice(lastIndex, match.index);
					const [, , base, rawExponent = ""] = match;
					const unit = UNIT_DEFINITIONS[resolveUnitKey(base)];
					let newPrefix = "";
					if (unit.allowPrefix !== false) {
						do {
							newPrefix = pickRandom(PREFIXES);
						} while (newPrefix === match[1]);
					}
					changed += `${newPrefix}${base}${rawExponent}`;
					lastIndex = regex.lastIndex;
				}
				changed += expression.slice(lastIndex);
				return changed;
			}

			function hasDimOverlapAcrossSides(expression) {
				const sanitized = cleanExpression(expression);
				const numeratorDims = new Set();
				const denominatorDims = new Set();

				const parts = sanitized.split("/");
				for (const [index, part] of parts.entries()) {
					const target = index === 0 ? numeratorDims : denominatorDims;
					const segments = part
						.split("*")
						.map((s) => s.replace(/[()]/g, ""))
						.filter(Boolean);

					for (const segment of segments) {
						const regex = unitRegex();
						let match;
						while ((match = regex.exec(segment)) !== null) {
							const [, , base] = match;
							const unit = UNIT_DEFINITIONS[resolveUnitKey(base)];
							if (!unit) continue;
							Object.keys(unit.dim).forEach((dimKey) => target.add(dimKey));
						}
					}
				}

				for (const dim of numeratorDims) if (denominatorDims.has(dim)) return true;
				return false;
			}

			function buildQuestion() {
				let fromUnit;
				let toUnit;
				let fromParsed;
				let toParsed;
				const ensureDifferentToUnit = (fromU, fromP, currentTo) => {
					const toP = parseUnits(currentTo);
					if (!toP.error && toP.normalized !== fromP.normalized) return currentTo;
					const fallback = randomUnitExpression(fromP.dim);
					const fallbackParsed = parseUnits(fallback);
					if (!fallbackParsed.error && fallbackParsed.normalized !== fromP.normalized)
						return fallback;
					return remapPrefixes(fromU);
				};

				for (let attempts = 0; attempts < 40; attempts++) {
					// Reset per attempt so stale toParsed/toUnit from previous iteration
					// cannot leak into a new pair and cause mismatched dimensions.
					toUnit = null;
					toParsed = null;
					fromUnit = randomUnitExpression();
					fromParsed = parseUnits(fromUnit);
					if (
						fromParsed.error ||
						!Object.keys(fromParsed.dim).length ||
						hasDimOverlapAcrossSides(fromUnit)
					)
						continue;

					for (let inner = 0; inner < 40; inner++) {
						toUnit = randomUnitExpression();
						toParsed = parseUnits(toUnit);
						if (
							!toParsed.error &&
							dimensionsEqual(fromParsed.dim, toParsed.dim) &&
							toParsed.normalized !== fromParsed.normalized &&
							!hasDimOverlapAcrossSides(toUnit)
						)
							break;
					}
					if (
						toParsed &&
						!toParsed.error &&
						dimensionsEqual(fromParsed.dim, toParsed.dim) &&
						toParsed.normalized !== fromParsed.normalized &&
						!hasDimOverlapAcrossSides(toUnit)
					)
						break;
				}

				if (
					!toParsed ||
					toParsed.error ||
					!dimensionsEqual(fromParsed.dim, toParsed.dim) ||
					toParsed.normalized === fromParsed.normalized
				) {
					// Final fallback: pick two different base units with identical dimensions
					const base = pickRandom(BASE_UNITS);
					const baseDim = UNIT_DEFINITIONS[base].dim;
					const sameDimUnits = BASE_UNITS.filter((b) =>
						dimensionsEqual(UNIT_DEFINITIONS[b].dim, baseDim),
					);
					const altCandidates = sameDimUnits.filter((u) => u !== base);
					const alt = altCandidates.length ? pickRandom(altCandidates) : base;
					fromUnit = base;
					toUnit = alt;
					fromParsed = parseUnits(fromUnit);
					toParsed = parseUnits(toUnit);
				}

				// Final guard to avoid identical units in the question
				toUnit = ensureDifferentToUnit(fromUnit, fromParsed, toUnit);
				if (fromUnit === toUnit && fromParsed?.dim) {
					for (let i = 0; i < 50 && fromUnit === toUnit; i++) {
						const candidate = randomUnitExpression(fromParsed.dim);
						const candidateParsed = parseUnits(candidate);
						if (
							!candidateParsed.error &&
							dimensionsEqual(candidateParsed.dim, fromParsed.dim) &&
							candidateParsed.normalized !== fromParsed.normalized
						) {
							toUnit = candidate;
						}
					}
					if (fromUnit === toUnit) {
						const remapped = remapPrefixes(fromUnit);
						if (remapped !== fromUnit) toUnit = remapped;
					}
				}

				const amount = +(Math.random() * 900 + 10).toFixed(2);
				return {
					amount,
					fromUnit,
					toUnit,
					expected: convertValue(amount, fromUnit, toUnit).value,
				};
			}

			let currentQuestion = null;
			const setMessage = (text, cssClass = "") =>
				$("#msg").removeClass("err ok").addClass(cssClass).text(text);
			function updatePreview() {
				try {
					const raw = answerField.latex();
					if (!raw) return $("#preview").text("");
					const cleaned = cleanExpression(raw);
					const tokens = tokenize(cleaned);
					if (tokens.error) return $("#preview").text("");
					const list = tokens.tokens || [];
					let rebuilt = "";
					let prevType = null;
					for (const tok of list) {
						const isUnit = tok.type === "unit";
						const isNumber = tok.type === "number";
						const isOpenParen = tok.type === "paren" && tok.value === "(";
						const isCloseParen = tok.type === "paren" && tok.value === ")";
						const needsStar =
							(isUnit || isOpenParen) &&
							(prevType === "unit" ||
								prevType === "number" ||
								prevType === "closeParen");
						if (needsStar) rebuilt += "*";
						rebuilt += tok.value;
						prevType = isCloseParen ? "closeParen" : tok.type;
					}
					const plain = toPlainUnits(rebuilt);
					const withoutParens = plain.replace(/[()]/g, "");
					const spaced = withoutParens
						.replace(/([0-9)])(?=[A-Za-zµ])/g, "$1 ")
						.replace(/\s+/g, " ")
						.trim();
					$("#preview").text(spaced);

					console.warn("Preview rendering failed", e);
					$("#preview").text("");

			function refreshMath() {
				if (typeof MathJax === "undefined") return;
				if (typeof MathJax.typesetPromise === "function") MathJax.typesetPromise();
				else if (typeof MathJax.typeset === "function") MathJax.typeset();
			}

			function renderQuestion() {
				currentQuestion = buildQuestion();

				$("#question").html(
					`Convert \\(${currentQuestion.amount}\\,${toLatexUnits(currentQuestion.fromUnit)}\\) to \\(${toLatexUnits(currentQuestion.toUnit)}\\).`,
				);
				const plainFrom = toPlainUnits(currentQuestion.fromUnit);
				const plainTo = toPlainUnits(currentQuestion.toUnit);
				$("#full").html(
					`Convert <strong>${currentQuestion.amount} ${plainFrom}</strong> to <strong>${plainTo}</strong>.`,
				);
				setMessage("");
				answerField.latex("");
				updatePreview();
				refreshMath();
			}
			function tokenize(expression) {
				const input = cleanExpression(expression);
				const tokens = [];
				const numberPattern = /[+-]?(?:\d+(?:\.\d*)?|\.\d+)(?:[eE][+-]?\d+)?/y;
				const unitPatternSticky = new RegExp(unitPattern, "y");

				let index = 0;
				while (index < input.length) {
					numberPattern.lastIndex = index;
					unitPatternSticky.lastIndex = index;
					const prev = tokens[tokens.length - 1];
					const canTakeSignedNumber =
						!prev ||
						prev.type === "operator" ||
						(prev.type === "paren" && prev.value === "(");

					const numberMatch = numberPattern.exec(input);
					if (numberMatch && (canTakeSignedNumber || !/^[-+]/.test(numberMatch[0]))) {
						tokens.push({ type: "number", value: numberMatch[0] });
						index = numberPattern.lastIndex;
						continue;
					}

					const unitMatch = unitPatternSticky.exec(input);
					if (unitMatch) {
						tokens.push({ type: "unit", value: unitMatch[0] });
						index = unitPatternSticky.lastIndex;
						continue;
					}

					const ch = input[index];
					if ("+-*/^".includes(ch)) {
						tokens.push({ type: "operator", value: ch });
						index++;
						continue;
					}
					if (ch === "(" || ch === ")") {
						tokens.push({ type: "paren", value: ch });
						index++;

			function parseExpression(inputTokens) {
				if (!inputTokens) return { error: "No tokens provided" };
				if (inputTokens.error) return { error: inputTokens.error };
				const tokens = Array.isArray(inputTokens) ? inputTokens : inputTokens.tokens;
				if (!Array.isArray(tokens)) return { error: "Tokens must be an array" };
				if (!tokens.length) return { error: "Unexpected end of input" };

				const state = { tokens, pos: 0 };

				const read = () => state.tokens[state.pos];
				const consume = () => state.tokens[state.pos++];

				const expect = (type, value) => {
					const tok = read();
					if (!tok || tok.type !== type || (value && tok.value !== value)) {
						state.error = `Expected ${value || type} at position ${state.pos}`;
						return null;
					}
					return consume();
				};

				const parsePrimary = () => {
					const tok = read();
					if (!tok) {
						state.error = "Unexpected end of input";
						return null;
					}

					if (tok.type === "number") {
						consume();
						return { type: "number", value: Number(tok.value) };
					}
					if (tok.type === "unit") {
						consume();
						const parsedUnit = unitFromSymbol(tok.value);
						if (parsedUnit.error) {
							state.error = parsedUnit.error;
							return null;
						}
						return { type: "unit", symbol: tok.value, payload: parsedUnit.unit };
					}
					if (tok.type === "operator" && (tok.value === "+" || tok.value === "-")) {
						consume();
						const operand = parsePrimary();
						if (state.error) return null;
						return { type: "unary", op: tok.value, value: operand };
					}
					if (tok.type === "paren" && tok.value === "(") {
						consume();
						const inner = parseAddSub();
						if (state.error) return null;
						if (!expect("paren", ")")) return null;
						return { type: "group", value: inner };
					}

					state.error = `Unexpected token ${tok.value} at position ${state.pos}`;
					return null;
				};

				const parseExponent = () => {
					let base = parsePrimary();
					if (state.error) return null;

					while (read() && read().type === "operator" && read().value === "^") {
						consume(); // ^
						const exponent = parseExponent();
						if (state.error) return null;
						base = { type: "power", base, exponent };
					}
					return base;
				};

				const parseMulDiv = () => {
					let left = parseExponent();
					if (state.error) return null;

					while (
						read() &&
						(read().type === "operator"
							? read().value === "*" || read().value === "/"
							: read().type === "unit" ||
								(read().type === "paren" && read().value === "("))
					) {
						const tok = read();
						const op = tok.type === "operator" ? consume().value : "*"; // implicit multiplication (e.g., 5 Hz)
						const right = parseExponent();
						if (state.error) return null;
						left = { type: "binary", op, left, right };
					}
					return left;
				};

				const parseAddSub = () => {
					let left = parseMulDiv();
					if (state.error) return null;

					while (
						read() &&
						read().type === "operator" &&
						(read().value === "+" || read().value === "-")
					) {
						const op = consume().value;
						const right = parseMulDiv();
						if (state.error) return null;
						left = { type: "binary", op, left, right };
					}
					return left;
				};

				const ast = parseAddSub();
				if (state.error) return { error: state.error };
				if (state.pos !== state.tokens.length) {
					return { error: `Unexpected token ${read().value} at position ${state.pos}` };
				}
				return { ast };
			}

			function evaluateAst(node) {
				if (!node) return { error: "No expression to evaluate." };

				const combine = (op, left, right) => {
					if (op === "+" || op === "-")
						return {
							error: "Addition and subtraction are not allowed in this answer.",
						};

					if (op === "*") {
						const leftOffset = left.unit.hasOffset;
						const rightOffset = right.unit.hasOffset;
						if (leftOffset || rightOffset) {
							if (leftOffset && rightOffset)
								return { error: "Offset units cannot be multiplied together." };
							const offsetSide = leftOffset ? left : right;
							const otherSide = leftOffset ? right : left;
							if (Object.keys(otherSide.unit.dim).length || otherSide.unit.hasOffset)
								return {
									error: "Offset units can only be scaled by pure numbers.",
								};
							return {
								value: left.value * right.value,
								unit: offsetSide.unit,
							};
						}
						return {
							value: left.value * right.value,
							unit: mulUnit(left.unit, right.unit),
						};
					}

					if (op === "/") {
						if (right.unit.hasOffset)
							return { error: "Offset units cannot be in the denominator." };
						if (left.unit.hasOffset) {
							if (Object.keys(right.unit.dim).length)
								return {
									error: "Offset units can only be divided by pure numbers.",
								};
							return {
								value: left.value / right.value,
								unit: left.unit,
							};
						}
						return {
							value: left.value / right.value,
							unit: divUnit(left.unit, right.unit),
						};
					}

					return { error: `Unsupported operator ${op}` };
				};

				switch (node.type) {
					case "number":
						return {
							value: node.value,
							unit: { factor: 1, dim: {}, hasOffset: false, offset: 0 },
						};
					case "unit":
						return { value: 1, unit: node.payload };
					case "unary": {
						const inner = evaluateAst(node.value);
						if (inner.error) return inner;
						return {
							value: node.op === "-" ? -inner.value : inner.value,
							unit: inner.unit,

					}
					case "group":
						return evaluateAst(node.value);
					case "power": {
						const base = evaluateAst(node.base);
						if (base.error) return base;
						if (base.unit.hasOffset)
							return { error: "Offset units like Celsius cannot be exponentiated." };
						const exponent = evaluateAst(node.exponent);
						if (exponent.error) return exponent;
						if (Object.keys(exponent.unit.dim).length)
							return { error: "Units are not allowed in exponents." };
						if (!Number.isFinite(exponent.value)) return { error: "Invalid exponent." };
						if (!Number.isInteger(exponent.value))
							return { error: "Exponent must be an integer for units." };
						return {
							value: Math.pow(base.value, exponent.value),
							unit: powUnit(base.unit, exponent.value),
						};
					}
					case "binary": {
						const left = evaluateAst(node.left);
						if (left.error) return left;
						const right = evaluateAst(node.right);
						if (right.error) return right;
						return combine(node.op, left, right);
					}
					default:
						return { error: `Unknown AST node type ${node.type}` };
				}
			}

			function sameUnitDefinition(a, b) {
				if (!a || !b) return false;
				if (!dimensionsEqual(a.dim, b.dim)) return false;
				if (a.hasOffset !== b.hasOffset) return false;
				if (a.hasOffset && a.offset !== b.offset) return false;
				// factor comparisons can be touchy; small tolerance helps with floating prefixes.
				return Math.abs(a.factor - b.factor) < 1e-12;
			}

			function parseAnswer(rawInput) {
				const trimmed = rawInput.trim();
				if (!trimmed) return { error: "Please enter a value and units." };

				try {
					const cleaned = cleanExpression(trimmed);
					const tokens = tokenize(cleaned);
					if (tokens.error) return { error: tokens.error };
					const parsed = parseExpression(tokens);
					if (parsed.error) return { error: parsed.error };
					const evaluated = evaluateAst(parsed.ast);
					if (evaluated.error) return { error: evaluated.error };

					if (!Number.isFinite(evaluated.value))
						return { error: "Invalid numeric expression." };
					if (!Object.keys(evaluated.unit.dim).length)
						return { error: "Units are required (e.g., m, kg, s)." };

					// check dimension compatibility with target
					const target = parseUnits(currentQuestion.toUnit);
					if (target.error) return { error: target.error };

					if (!dimensionsEqual(evaluated.unit.dim, target.dim)) {
						return {
							error: `Dimension mismatch. Expected units for ${currentQuestion.toUnit}`,
						};
					}

					if (!sameUnitDefinition(evaluated.unit, target)) {
						return {
							error: `Answer must use the requested unit: ${currentQuestion.toUnit}`,
						};
					}

					// Return value already in *base* scaling for the user’s unit expression:
					return { value: evaluated.value, unitObj: evaluated.unit };
				} catch (e) {
					console.error("Failed to parse answer:", e);
					return { error: "Could not parse expression. Check your syntax." };
				}
			}

			/**
			 * Recursively traverses the math tree to extract units
			 */ function cloneDim(dim) {
				return { ...dim };
			}

			function addDim(a, b, scale = 1) {
				const out = cloneDim(a);
				for (const k of Object.keys(b)) {
					out[k] = (out[k] || 0) + b[k] * scale;
					if (out[k] === 0) delete out[k];
				}
				return out;
			}

			function powUnit(unit, p) {
				return {
					factor: Math.pow(unit.factor, p),
					dim: Object.fromEntries(
						Object.entries(unit.dim)
							.map(([k, v]) => [k, v * p])
							.filter(([, v]) => v !== 0),
					),
					hasOffset: false,
					offset: 0,
				};
			}

			function mulUnit(u1, u2) {
				return {
					factor: u1.factor * u2.factor,
					dim: addDim(u1.dim, u2.dim, 1),
					hasOffset: false,
					offset: 0,
				};
			}

			function divUnit(u1, u2) {
				return {
					factor: u1.factor / u2.factor,
					dim: addDim(u1.dim, u2.dim, -1),
					hasOffset: false,
					offset: 0,
				};
			}

			function isUnitSymbol(symbol) {
				const r = new RegExp(`^${unitPattern}$`);
				return r.test(symbol);
			}

			function unitFromSymbol(symbol) {
				// Parse a single unit token like "Tmin", "mkat", "Hz", "mol", "daA", etc.
				// Use your existing regex (prefix)(base)(^exp?) but here we only expect one token.
				const r = new RegExp(`^${unitPattern}$`);
				const m = symbol.match(r);
				if (!m) return { error: `Invalid unit token: ${symbol}` };

				const [, prefixSymbol = "", base, rawExponent = ""] = m;
				const resolvedKey = resolveUnitKey(base);
				const def = UNIT_DEFINITIONS[resolvedKey];
				if (!def) return { error: `Unrecognized base unit: ${base}` };
				if (!(prefixSymbol in PREFIX_MULTIPLIERS))
					return { error: `Unrecognized prefix: ${prefixSymbol}` };
				if (prefixSymbol && def.allowPrefix === false)
					return { error: `Prefix not allowed for ${base}` };

				if (def.offset && rawExponent)
					return { error: "Offset units like Celsius cannot be exponentiated." };

				const exp = rawExponent ? parseInt(rawExponent.slice(1), 10) : 1;

				// If prefixes not allowed, drop prefix in meaning (optional design choice).
				const prefixMul = PREFIX_MULTIPLIERS[prefixSymbol];
				const factor = Math.pow(
					def.factor * (def.allowPrefix === false ? 1 : prefixMul),
					exp,
				);

				// dimension power
				const dim = {};
				for (const [k, v] of Object.entries(def.dim)) dim[k] = v * exp;

				return {
					unit: { factor, dim, hasOffset: Boolean(def.offset), offset: def.offset || 0 },
				};
			}

			function separateValueAndUnitObj(node) {
				// unit symbol
				if (node.isSymbolNode && isUnitSymbol(node.name)) {
					const parsed = unitFromSymbol(node.name);
					if (parsed.error) return { error: parsed.error };
					return { valueNode: new math.ConstantNode(1), unit: parsed.unit };
				}

				// pure number
				if (node.isConstantNode) {
					return {
						valueNode: node,
						unit: { factor: 1, dim: {}, hasOffset: false, offset: 0 },
					};
				}

				// parentheses
				if (node.isParenthesisNode) {
					const inner = separateValueAndUnitObj(node.content);
					if (inner.error) return inner;
					return {
						valueNode: new math.ParenthesisNode(inner.valueNode),
						unit: inner.unit,
					};
				}

				// operators
				if (node.isOperatorNode) {
					const left = separateValueAndUnitObj(node.args[0]);
					if (left.error) return left;

					const right = node.args[1] ? separateValueAndUnitObj(node.args[1]) : null;
					if (right && right.error) return right;

					// allow unary +/- to pass through
					if ((node.op === "+" || node.op === "-") && node.args.length === 1) {
						const newValueNode = new math.OperatorNode(node.op, node.fn, [
							left.valueNode,
						]);
						return { valueNode: newValueNode, unit: left.unit };
					}

					if (node.op === "*" || node.op === "/") {
						const leftOffset = left.unit.hasOffset;
						const rightOffset = right && right.unit.hasOffset;

						if (node.op === "*") {
							if (leftOffset || rightOffset) {
								if (leftOffset && rightOffset)
									return { error: "Offset units cannot be multiplied together." };
								const offsetSide = leftOffset ? left : right;
								const otherSide = leftOffset ? right : left;
								if (
									Object.keys(otherSide.unit.dim).length ||
									otherSide.unit.hasOffset
								)
									return {
										error: "Offset units can only be scaled by pure numbers.",
									};
								const newValueNode = new math.OperatorNode(node.op, node.fn, [
									left.valueNode,
									right.valueNode,
								]);
								return { valueNode: newValueNode, unit: offsetSide.unit };
							}
						}

						if (node.op === "/") {
							if (rightOffset)
								return { error: "Offset units cannot be in the denominator." };
							if (leftOffset) {
								if (Object.keys(right.unit.dim).length)
									return {
										error: "Offset units can only be divided by pure numbers.",
									};
								const newValueNode = new math.OperatorNode(node.op, node.fn, [
									left.valueNode,
									right.valueNode,
								]);
								return { valueNode: newValueNode, unit: left.unit };
							}
						}
						const newValueNode = new math.OperatorNode(node.op, node.fn, [
							left.valueNode,
							right.valueNode,
						]);
						const newUnit =
							node.op === "*"
								? mulUnit(left.unit, right.unit)
								: divUnit(left.unit, right.unit);
						return { valueNode: newValueNode, unit: newUnit };
					}

					if (node.op === "^") {
						if (left.unit.hasOffset)
							return { error: "Offset units like Celsius cannot be exponentiated." };
						// exponent must be unitless and evaluable to an integer
						if (right.unit && Object.keys(right.unit.dim).length) {
							return { error: "Units are not allowed in exponents." };
						}

						// evaluate exponent numeric value
						const expVal = right.valueNode.compile().evaluate();
						if (!Number.isFinite(expVal)) return { error: "Invalid exponent." };
						if (!Number.isInteger(expVal))
							return { error: "Exponent must be an integer for units." };

						const newValueNode = new math.OperatorNode(node.op, node.fn, [
							left.valueNode,
							right.valueNode,
						]);
						return { valueNode: newValueNode, unit: powUnit(left.unit, expVal) };
					}

					// Disallow + and - (same as you do now)
					return { error: "Addition and subtraction are not allowed in this answer." };
				}

				// anything else: treat as value-only
				return { valueNode: node, unit: { factor: 1, dim: {} } };
			}
			const UNIT_TOKENS = ALL_UNIT_SYMBOLS.flatMap((baseUnit) => [
				baseUnit,
				...PREFIXES.filter(Boolean).map((prefixSymbol) => `${prefixSymbol}${baseUnit}`),
			]);
			const mathQuillInterface = MathQuill.getInterface(2);
			const answerField = mathQuillInterface.MathField(document.getElementById("answerMQ"), {
				autoOperatorNames: UNIT_TOKENS.filter((t) => t.length >= 2)
					.map((t) => t.replace("µ", "u"))
					.join(" "),
				handlers: {
					edit: () => {
						setMessage("");
						updatePreview();
					},
				},
			});

			$(document).on("keydown", "#answerMQ textarea", function (e) {
				if (e.key === "+" || e.key === "\\" || e.key === "_" || e.key === "=") {
					e.preventDefault();
					return false;
				}
			});
			$(document).on("paste", "#answerMQ textarea", function (e) {
				e.preventDefault();
			});

			$("#submit").on("click", () => {
				const answer = parseAnswer(answerField.latex());
				if (answer.error) return setMessage(answer.error, "err");

				const converted = convertValue(
					answer.value,
					answer.unitObj,
					currentQuestion.toUnit,
				);

				if (converted.error) return setMessage(converted.error, "err");

				const tolerance = Math.max(1e-12, Math.abs(currentQuestion.expected) * 0.005);
				const isCorrect = Math.abs(converted.value - currentQuestion.expected) <= tolerance;
				setMessage(
					isCorrect
						? "Correct!"
						: `Incorrect—expected ≈ ${currentQuestion.expected.toPrecision(6)} ${currentQuestion.toUnit}.`,
					isCorrect ? "ok" : "err",
				);
			});

			$("#next").on("click", renderQuestion);
			renderQuestion();
		</script>
	</body>
</html>
