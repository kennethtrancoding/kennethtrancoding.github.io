<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Metric Conversions</title>

		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.css" />
		<link rel="stylesheet" href="./styles.css" />
	</head>

	<body>
		<nav class="top-nav">
			<a href="https://kennethtrancoding.com" target="_blank" rel="noopener noreferrer"
				>Kennethtrancoding</a
			>
			<span aria-hidden="true">|</span>
			<span>Metric Conversions</span>
		</nav>
		<div class="wrap">
			<div id="question"></div>
			<hr />
			<div class="row">
				<span id="answerMQ" aria-label="Answer"></span>
				<button id="submit">Submit</button>
				<button id="next">New</button>
				<div id="hint"></div>
			</div>
			<div class="control-row" aria-label="Input controls">
				<button class="control-btn" data-action="left" aria-label="Move left">◀</button>
				<button class="control-btn" data-action="right" aria-label="Move right">▶</button>
				<button class="control-btn" data-action="backspace" aria-label="Delete">⌫</button>
				<button class="control-btn" data-action="fraction" aria-label="Insert fraction">a/b</button>
				<button class="control-btn" data-action="exponent" aria-label="Insert exponent">x^y</button>
			</div>
			<div id="preview"></div>
			<div id="msg"></div>
		</div>

		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/mathquill/0.10.1/mathquill.min.js"></script>
		<script>
			window.MathJax = {
				loader: { load: ["[tex]/color"] },
				tex: {
					packages: { "[+]": ["color"] },
				},
			};
		</script>
		<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

		<script type="module" src="./script.js"></script>
	</body>
</html>
